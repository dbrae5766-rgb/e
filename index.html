<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Local Speed Test</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="background"></div>
<div id="glow"></div>

<div class="container">

    <div class="panel">

        <div class="title">
            Local Speed Test
        </div>

        <div class="speed-circle">

            <div class="speed">

                <div id="speed">
                    0
                </div>

                <div class="unit">
                    Mbps
                </div>

            </div>

        </div>

        <div class="status" id="status">
            Ready
        </div>

        <div class="progress">

            <div
                class="progress-bar"
                id="progressBar">
            </div>

        </div>

        <div class="stats">

            <div class="card">

                <div class="card-title">
                    Ping
                </div>

                <div
                    class="card-value"
                    id="ping">
                    --
                </div>

            </div>

            <div class="card">

                <div class="card-title">
                    Download
                </div>

                <div
                    class="card-value"
                    id="download">
                    --
                </div>

            </div>

            <div class="card">

                <div class="card-title">
                    Upload
                </div>

                <div
                    class="card-value"
                    id="upload">
                    --
                </div>

            </div>

        </div>

        <button
            class="start"
            id="startButton">

            Start Test

        </button>

        <div class="footer">

            Server:
            <span id="serverName">
                localhost
            </span>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
